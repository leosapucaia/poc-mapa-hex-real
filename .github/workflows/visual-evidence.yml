name: Visual Evidence

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Take screenshots
        run: npx playwright test e2e/visual-evidence.spec.ts

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-evidence
          path: e2e-screenshots/
          retention-days: 30

      - name: Comment on PR with screenshots
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const screenshotsDir = 'e2e-screenshots';
            if (!fs.existsSync(screenshotsDir)) return;

            const files = fs.readdirSync(screenshotsDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) return;

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = '## 📸 Visual Evidence\n\n';
            body += `Screenshots captured from PR #${context.issue?.number || 'preview'}\n\n`;

            for (const file of files.sort()) {
              const label = file.replace('.png', '').replace(/^\d+-/, '').replace(/-/g, ' ');
              body += `### ${label}\n`;
              body += `![${file}](${runUrl}#step:5:1)\n\n`;
            }

            body += `🔗 [Download all screenshots](${runUrl}#artifacts)\n`;

            // Find and update existing comment or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue?.number || context.payload.pull_request?.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('📸 Visual Evidence')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue?.number || context.payload.pull_request?.number,
                body,
              });
            }
