name: Visual Evidence

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Take screenshots
        run: npx playwright test e2e/visual-evidence.spec.ts

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-evidence
          path: e2e-screenshots/
          retention-days: 30

      - name: Comment on PR with screenshots
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const screenshotsDir = 'e2e-screenshots';
            if (!fs.existsSync(screenshotsDir)) {
              console.log('No screenshots directory found');
              return;
            }

            const files = fs.readdirSync(screenshotsDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) {
              console.log('No screenshot files found');
              return;
            }

            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              console.log('No PR number found');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}#artifacts`;

            let body = '## 📸 Visual Evidence\n\n';
            body += `Automated screenshots from Playwright\n\n`;

            for (const file of files.sort()) {
              const label = file.replace('.png', '').replace(/^\d+-/, '').replace(/-/g, ' ');
              body += `**${label}** — \`${file}\`\n\n`;
            }

            body += `🔗 [Download screenshots](${artifactsUrl})`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body?.includes('Visual Evidence')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('Created new comment');
            }
