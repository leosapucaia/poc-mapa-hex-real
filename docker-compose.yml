services:
  # Development server with hot-reload
  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0

  # Production preview (nginx)
  prod:
    build:
      context: .
      target: prod
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production

  # CORS proxy for external APIs (Overpass, OpenTopography)
  cors-proxy:
    image: redocly/cors-anywhere:latest
    ports:
      - "8080:8080"
    environment:
      - CORSANYWHERE_WHITELIST=
    command: ["node", "server.js"]
